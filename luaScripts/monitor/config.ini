keepAliveCheckSecond = 3
reconnectSecond = 3

[client_CTP]
tagTemplate = traderservice
address = 127.0.0.1:57000
isGetdAddressFromNameServer = 0
isUsedAloneIO = 0
timeoutSecond = 30
keepAliveCheckSecond = 3
reconnectSecond = 3

[client_xtquoter]
tagTemplate = xtquoter
address = 127.0.0.1:59000
isGetdAddressFromNameServer = 0
isUsedAloneIO = 0
timeoutSecond = 30
keepAliveCheckSecond = 3
reconnectSecond = 3
